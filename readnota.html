<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leggi msg</title>
     <link rel="icon" href="img/favicon.png"  type="image/png">
     <link rel="stylesheet" href="style-readnota.css"> <!-- Il file CSS --> 


  </head>
  <body>
        

    <div class="container">
     <h2>Leggi note</h2>

       <p id="nome"   >Nome archivio</p> 
      <input type="text" name="archivio" id="archivio"  autocomplete="off">     
      <div  id="errorarch"  ></div>         
       <p id="tit"   >titolo nota</p> 
      <input type="text" name="nota" id="titolo" required  >           
      <div  id="errortitolo"  ></div>          
      
      <textarea  name="message" id="message" rows="4"  cols="30" ></textarea>             

      <button onclick="verifica()" 
            type="button" id="verifica" >Richiama nota</button>

       <button onclick="decripta()" disabled = "disabled"; 
            type="button" id="abilita" >Decripta nota</button>
        <button onclick="inizio()"  id="ritorna">Pagina iniziale</button>    
      
       <input type="text" name="data" id="data" >

   </div>  

    <script>


        let numero ;        
        let conta;
        let msg;
        let lunghezza;
        let lettera;
        let converti;
        let pari;     
        let stringaConverti;
        let numeroRandom;
        let nota;
        let db;
        let archivio;


             let data= new Date(); 
             document.getElementById('data').value = (data) ; 
             
             function verifica(){
                
              archivio = document.getElementById('archivio').value;

              lunghezza = archivio.length;
              if(lunghezza  < 3 ){
                 
               document .getElementById("errorarch").innerText = "nome archivio errato "; 
               return                                   
                 } 
               document .getElementById("errorarch").innerText = ""; 
               nota = document.getElementById('titolo').value;
               lunghezza = nota.length;
              if(lunghezza  < 3 ){
               document .getElementById("errortitolo").innerText = "titolo nota errato o mancante";  
               return
              }

            // 1. Apri il database
              const request = indexedDB.open(archivio, 1);

              request.onsuccess = function(event) {
               const db = event.target.result;

             // 2. Apri una transazione in lettura
               const transaction = db.transaction(["note"], "readonly");

             // 3. Accedi allo store
               const Store = transaction.objectStore("note");

             // 4. Leggi il record con una specifica chiave (es. 123)
              const getRequest = Store.get(nota);

              // 5. Gestisci il successo della lettura
               getRequest.onsuccess = function(e) {
              const record = e.target.result;
             
             if (record) {
               numeroRandom = record.numero;
               msg = record.messaggio;
               numeroRandom = numeroRandom -3;
               document.getElementById('message').value = (msg) ; 
                document.getElementById('abilita').disabled = false; 
     
            } else {
                document .getElementById("error").innerText = "titolo nota errato o mancante";
               
    }
  };
 
};
                
         
            }
    
                
                                                                   
              function decripta(){
                                                        
                let  stringaConverti = "";
                let  numero = numeroRandom;
                
                 let lunghezza = msg.length;  

                 for ( let conta=0; conta <lunghezza; conta ++)
	               {		
                 let   lettera = msg[conta] ;  	     		 
                 let  converti = lettera.charCodeAt(0);
                  
	  	         let   pari = conta;	  	  	  	  

                 if (pari %2 == 0) {  
                  converti=converti + numero;
               
                }
                 else{     
                 converti = converti - numero; 
                
               }

                 numero = numero  -1;
            	
		         stringaConverti+=String.fromCharCode(converti) ;                             
         
          } 
              
                 document.getElementById("message").value = stringaConverti;
                 
                
      }    
             
                 function inizio(){
               location.href='index.html';
               return
              }

                
        
    </script>
     
        
 </body>
 </html>

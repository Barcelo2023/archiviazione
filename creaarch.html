<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea archivio</title>
     <link rel="icon" href="img/favicon.png"  type="image/png">
     <link rel="stylesheet" href="style-creaarch.css"> <!-- Il file CSS --> 
   </head>
     <body>

       <div class="container">
       <h2>Crea archivio</h2>
    
      
       <p id="nome">Nome dell'archivio</p>
       <input type="text" name="nome" id="arch" autocomplete="off">
       <div id="error"></div>
       
       <button onclick="creaarch()" id="crea" >Crea archivio</button> 
       <button onclick="inizio()"  id="ritorna">Pagina iniziale</button>

      
       <input type="text" name="data" id="data"  readonly>

       </div>               
        
    <script>

               let data = new Date(); 
               document.getElementById('data').value = (data); 
                        
                function creaarch()  { 
           

                const testoOriginale = document.getElementById('arch').value;
                 const archivio = testoOriginale.toLowerCase().replace(/ /g, "");
                                                                       
                // Risultato: "testo in maiuscolo"

                let  lunghezza = archivio.length; 
              
                 if (lunghezza < 5 || lunghezza > 10)  {
                  document .getElementById("error").innerText = "nome archivio errato o mancante"; 
                  return
                 } 
  
                 //      se archivioo non esiste lo creo 
                  document .getElementById("error").innerText = ""; 

               let db;
               let request = indexedDB.open(archivio, 1);
               let appenaCreato = false; // Flag di controllo

                request.onupgradeneeded = (event) => {
                db = event.target.result;
                if (!db.objectStoreNames.contains("note")) {
                 db.createObjectStore("note", { keyPath: "id", autoIncrement: true });
                 appenaCreato = true; // Segnala che è una nuova creazione
              }
              };

              request.onsuccess = function(event) {
                db = event.target.result;
  
                // Controlla il flag per decidere quale messaggio mostrare
             if (appenaCreato) {
              document.getElementById("error").innerText = "archivio creato con successo";
             } else {
              document.getElementById("error").innerText = "archivio esistente";
               }
             };

            }

               function inizio(){
               location.href='index.html';
               return
              }
    </script>   
        
    </body> 
    </html>

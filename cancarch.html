<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancella archivio</title>
     <link rel="icon" href="img/favicon.png"  type="image/png">
     <link rel="stylesheet" href="style-cancella.css"> <!-- Il file CSS --> 
   </head>
     <body>

       <div class="container">
       <h2>Cancella archivio</h2>
    
      
       <p id="nome">Nome dell'archivio</p>
       <input type="text" name="nome" id="arch" autocomplete="off">
       <div id="error"></div>
       
       <button onclick="cancella()" id="cancella" >Cancella archivio</button> 
       <button onclick="inizio()"  id="ritorna">Pagina iniziale</button>

      
       <input type="text" name="data" id="data"  readonly>

       </div>               
        
    <script>

               let data = new Date(); 
               document.getElementById('data').value = (data); 
                        
                function cancella()  { 
           


                const testoOriginale = document.getElementById('arch').value;
                 const archivio = testoOriginale.toLowerCase().replace(/ /g, "");
                                                                       
                // Risultato: "testo in maiuscolo"

                let  lunghezza = archivio.length; 
              
                 if (lunghezza < 5 || lunghezza > 10)  {
                  document .getElementById("error").innerText = "nome archivio errato o mancante"; 
                  return
                 } 
  
               // 1. Prima di cancellare il database, assicurati che tutte le connessioni siano chiuse.
               let req = indexedDB.deleteDatabase(archivio);

                req.onsuccess = function () {
                 document .getElementById("error").innerText = "database cancellato con successo"; 
              
                };

                 req.onerror = function () {
                console.error("Errore durante la cancellazione del database.");
             };

              req.onblocked = function () {
               console.warn("Operazione bloccata. Chiudi tutte le altre schede/finestre aperte dell'app.");
               };


            }

               function inizio(){
               location.href='index.html';
               return
              }
    </script>   
        
    </body> 
    </html>

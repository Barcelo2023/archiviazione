<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

</head>
 <body>

     <div class="container">
     <h2>Inserisce nota</h2>
        <div  id="tit"   >Nome Archivio</div>
     <input type="text"   id="archivio"  required  autocomplete="off" >     
      <div  id="errorarch"   ></div>
      <div  id="tit"   >Titolo nota</div>
     <input type="text"   id="titolo"  required  autocomplete="off">     
      <div  id="errortitolo"   ></div>
     <textarea  name="message" id="message" rows="4"  cols="30"  required></textarea>
     <div  id="errormessage"   ></div>
      <button onclick= "cripta()" 
      type="button" >Inserisce nota</button>
      <button onclick="inizio()"  id="ritorna">Pagina iniziale</button>

      <input type="text" id="data"  name="data" readonly>
     
     
     
    
      </div>
           
    <script>

           let stringaAscii = "";
           let stringaConverti ;
          
           let stringa2;
           let conta = 0;
            let testoMessage ="";
            let lunghezza = 0;
            let converti =0;
            let ascii = "";          
            let pari=0;
            let lettera = "";            
            let data ;
            let titolo;
            let archivio;
            let key;        
            let dati;
        
        
                       
                  data = new Date();                                                                
                  document.getElementById('data').value = (data) ; 

                  let randomNumber= Math.floor(Math.random() * 30) + 1;
                  randomNumber = randomNumber + 10;                                                                 
                               
             do{	 
               	stringaAscii +=  String.fromCharCode(conta);                   
                 conta++;                 	
              	}while ( conta < 255); 
                  
                 function cripta() { 
                   archivio = document.getElementById('archivio').value; 
                   lunghezza = archivio.length;                            
                 if (lunghezza  < 5){
                 document .getElementById("errorarch").innerText = "Nome archivio mancante o errato "; 
                 return                                   
                 } 
                  document .getElementById("errorarch").innerText = "";  
                
                 titolo = document.getElementById('titolo').value;

                 lunghezza = titolo.length;                            
                 if (lunghezza  < 5){
                 document .getElementById("errortitolo").innerText = "Titolo mancante "; 
                 return                                   
                 } 
                 document .getElementById("errortitolo").innerText = ""; 
                testoMessage = document.getElementById('message').value;   
                           
                 stringaConverti =""; 
                 numero = randomNumber;
                 lunghezza = testoMessage.length; 
   
                 if (lunghezza < 15 ){
                  document .getElementById("errormessage").innerText = "messaggio mancante"; 
                  return
                 } 
             
                 document .getElementById("errormessage").innerText = ""; 
                 
               for (conta=0; conta <lunghezza; conta ++)
	               {		
                 lettera = testoMessage[conta] ;  	     		 
                 converti = lettera.charCodeAt(0);
                
	  	           pari = conta;	  	  	  	  

                if (pari %2 == 0) {  
                converti=converti -numero;
               
                }
                else{     
                converti = converti +numero; 
                
               }
               numero = numero  -1;
             	
		           stringaConverti+= String.fromCharCode(converti) ;          

              }     
                document.getElementById('message').value = stringaConverti;               
                stringa2 = stringaConverti; 

                 // 1.  apro database'
                  archivio = document.getElementById('archivio').value;

                 let db;
                const request = indexedDB.open(archivio, 1);

                    request.onupgradeneeded = (event) => {
                    document .getElementById("error").innerText = "nome archivio errato o mancante";   

                    }
                 request.onsuccess = function(event) {
                 db = event.target.result;
  
                  // 2. Creare la transazione 'readwrite'
                   const transaction = db.transaction(["note"], "readwrite");
                   const store = transaction.objectStore("note");

                    randomNumber = randomNumber +3;
                    key = titolo; // La tua chiave
                    dati= { numero: randomNumber, messaggio: stringa2 }; 
                     store.put(dati, key);                  
                
                   document.getElementById('message').value = "nota inserita con successo";               
  };               
   
  };
                     function inizio(){
               location.href='index.html';
               return
              }
        
  
    </script>
              
  </body>

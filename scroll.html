
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"  content="width=device-width,
        initial-scale=1.0"> 
        <title>htlm scroll</title>
     </head>
     <style>
        #contenitore{
        width: 273px;           
        height: 500px; 
        border-radius: 6px;
        background-color: cornflowerblue;         
        overflow-y: auto;   /* Scroll verticale automatico se  eccede */
        border: 2px solid #333; /* Bordo per evidenziare l'area */
        padding: 10px;
        text-align: center;
        
    }
    #nome{
      transform: translateY(10px);
    }
    input{
      width: 180px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
    }
    #error{
      color: red;
    }

    button{
      width: 120px;
      height: 30px;
      border-radius: 7px;
      cursor: pointer;
      margin-top: 30px;
    }
     </style>
     <body>
         

    <div id="contenitore">
     <h3>Elenco chiavi inserite</h3>
     <p id="nome">nome archivio</p> 
     
     <input type="text" id="arch">
     <div  id="error"   ></div>

     <button onclick="leggichiavi()">leggi chiavi</button>
        </div>
      <script>

         function leggichiavi(){
           let  archivio = document.getElementById('arch').value;

          let trovato =  localStorage.getItem(archivio);
                if (trovato === null){
                 
                 document .getElementById("error").innerText = "nome archivio errato "; 
                 return                                   
                 } 
            document .getElementById("error").innerText ="";      
           const request = indexedDB.open(archivio, 1);

           request.onsuccess = function(event) {
          const db = event.target.result;
  
           // 2. Creare la transazione 'readwrite'
           const transaction = db.transaction(["note"], "readwrite");
            const store = transaction.objectStore("note"); 
            // 1. Apre il cursore per tutti i record
            const request = store.openCursor();

            request.onsuccess = (event) => {
           const cursor = event.target.result;
  
          // 2. Se il cursore ha un valore, prosegui
           if (cursor) {

           // Seleziona il contenitore
            let container = document.getElementById('contenitore');
   
        
             // Crea un nuovo elemento p
             let nuovoElemento = document.createElement('p');
              nuovoElemento.textContent = cursor.key;
               

             // Aggiunge il nuovo elemento alla fine
             container.appendChild(nuovoElemento);
        
             // Scorre automaticamente verso il basso
               container.scrollTop = container.scrollHeight;
          
    
           // 3. Passa al record successivo
           cursor.continue();
              } else {
            
      return
            }
        }; 
      }           
  }              
            
    
      </script>
     </body>
     </html>

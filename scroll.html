
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"  content="width=device-width,
        initial-scale=1.0"> 
        <title>htlm scroll</title>
     </head>
     <style>
        #contenitore{
        height: 100vh;
         width: 100vw;
        border-radius: 6px;
        background-color:#35393d;       
        overflow-y: auto;   /* Scroll verticale automatico se  eccede */
        border: 2px solid bisque; /* Bordo per evidenziare l'area */
        padding: 10px;
        text-align: center;
        color: #83abd8; 
    }

    h2{
     color: #83abd8;  
    }
    #nome{
      transform: translateY(10px);
      color: #83abd8; 
    }


    input{
      width: 180px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
    }
    #error{
      color: red;
    }

    button{
      width: 120px;
      height: 30px;
      border-radius: 7px;
      cursor: pointer;
      margin-top: 30px;
      background-color:#35393d; 
      color: #83abd8;
}
    
     </style>
     <body>
         

    <div id="contenitore">
     <h2>Elenco note inserite</h2>
     <p id="nome">nome archivio</p> 
     
     <input type="text" id="arch" autocomplete="off">
     <div  id="error"   ></div>

     <button onclick="leggichiavi()">Leggi note</button>
     <button onclick="inizio()"  id="ritorna">Pagina iniziale</button>


        </div>
      <script>

         function leggichiavi(){
           const testoOriginale = document.getElementById('arch').value;
                 const archivio = testoOriginale.toLowerCase().replace(/ /g, "");
 
                   lunghezza = archivio.length;                            
                 if (lunghezza  < 5){
                 document .getElementById("error").innerText = "Nome archivio mancante o errato "; 
                 return                                   
                 } 

                  document .getElementById("error").innerText= "" ; 
           
               const request = indexedDB.open(archivio, 1);

               request.onsuccess = function(event) {
                const db = event.target.result;
  
                // 2. Creare la transazione 'readwrite'
                const transaction = db.transaction(["note"], "readwrite");
               const store = transaction.objectStore("note"); 
            // 1. Apre il cursore per tutti i record
               const request = store.openCursor();

                 request.onsuccess = (event) => {
               const cursor = event.target.result;
  
      
              // 2. Se il cursore ha un valore, prosegui
            if (cursor) {

                        // Seleziona il contenitore
            let container = document.getElementById('contenitore');
   
        
             // Crea un nuovo elemento p
             let nuovoElemento = document.createElement('p');
              nuovoElemento.textContent = cursor.key;
               

             // Aggiunge il nuovo elemento alla fine
             container.appendChild(nuovoElemento);
        
             // Scorre automaticamente verso il basso
               container.scrollTop = container.scrollHeight;
          
    
           // 3. Passa al record successivo
           cursor.continue();
              } else {
                // Aggiunge fine elenco
               let container = document.getElementById('contenitore'); 
               let nuovoElemento = document.createElement('p');
              nuovoElemento.textContent = "fine elenco note";
               

             // Aggiunge il nuovo elemento alla fine
             container.appendChild(nuovoElemento);  
           
              
             document .getElementById("arch").value = ""; 

      return
            }
        }; 
      }           
  }              
                  function inizio(){
               location.href='index.html';
               return
              }   
    
      </script>
     </body>
     </html>
